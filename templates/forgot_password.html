<!DOCTYPE html>
<html>
<head>
    <title>Forgot Password</title>
</head>
<body>

<h2>Reset Password</h2>

<form id="forgotForm">

    <input
        type="text"
        id="username"
        placeholder="Username"
        required>

    <br><br>

    <input
        type="password"
        id="new_password"
        placeholder="New Password"
        required>

    <br><br>

    <button type="submit">
        Reset Password
    </button>

</form>

<script src="{{ url_for('static', filename='js/forgot.js') }}"></script>

</body>
</html>
